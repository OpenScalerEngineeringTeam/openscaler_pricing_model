
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui,-apple-system,sans-serif);color:var(--color-text-primary,#1a1a1a);line-height:1.4}
.section{margin-bottom:1.25rem}
.section-title{font-size:11px;font-weight:600;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem}
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:.6rem .85rem;background:var(--color-background-secondary,#f5f5f4);border:0.5px solid var(--color-border-tertiary,#e5e5e0);border-radius:10px;margin-bottom:.85rem}
.toolbar-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.metrics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:.75rem}
.metric{background:var(--color-background-secondary,#f5f5f4);border:0.5px solid var(--color-border-tertiary,#e8e8e3);border-radius:8px;padding:.45rem .55rem}
.metric-label{font-size:9px;color:var(--color-text-secondary,#666);margin-bottom:2px;line-height:1.25}
.metric-value{font-size:14px;font-weight:600;color:var(--color-text-primary);font-variant-numeric:tabular-nums;line-height:1.2}
.metric-value.danger{color:var(--color-text-danger,#b42318)}
.metric-value.success{color:var(--color-text-success,#3b6d11)}
.metric-value.warn{color:var(--color-text-warning,#854f0b)}
.metric-sub{font-size:9px;color:var(--color-text-secondary,#888);margin-top:2px;font-variant-numeric:tabular-nums;line-height:1.25}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
@media(max-width:960px){.two-col{grid-template-columns:1fr}}
.card{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e5e5e0);border-radius:12px;padding:.95rem 1rem;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.params-tabs-section{margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary,#eee)}
.params-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.85rem}
.param-tab{font-size:11px;padding:5px 10px;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:8px;background:var(--color-background-primary,#fff);cursor:pointer;color:var(--color-text-secondary);font-weight:500;transition:background .15s,color .15s,border-color .15s}
.param-tab:hover:not(.active){background:var(--color-background-secondary,#f0f0eb)}
.param-tab.active{background:var(--color-text-primary,#1a1a1a);color:var(--color-background-primary,#fff);border-color:var(--color-text-primary,#1a1a1a)}
.params-panel{min-height:180px}
.params-footnote{font-size:11px;color:var(--color-text-secondary);margin-top:.75rem;line-height:1.45}
.vm-table-wrap{max-height:min(340px,42vh);overflow:auto;border-radius:8px;border:0.5px solid var(--color-border-tertiary,#eee)}
.footnote--vm{margin-top:6px;padding-top:6px;font-size:10px;line-height:1.35}
.vm-table{width:100%;font-size:11px;border-collapse:collapse}
.vm-table th{font-weight:600;font-size:10px;color:var(--color-text-secondary);text-align:left;padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:0;background:var(--color-background-primary,#fff);z-index:1}
.vm-table tbody tr:hover td{background:var(--color-background-secondary,#fafaf8)}
.vm-table td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary,#f0f0eb)}
.vm-table .plan-id{font-size:10px;color:var(--color-text-tertiary,#999)}
.vm-table .price-sub{display:block;font-size:10px;color:var(--color-text-secondary);margin-top:2px;font-variant-numeric:tabular-nums}
.price-display-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary)}
.price-display-wrap select{font-size:12px;padding:5px 10px;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:8px;background:var(--color-background-primary,#fff);color:var(--color-text-primary);cursor:pointer}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.pill-ok{background:#EAF3DE;color:#3B6D11}
.pill-warn{background:#FAEEDA;color:#854F0B}
.pill-bad{background:#FCEBEB;color:#A32D2D}
.breakdown-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px}
.breakdown-bar-wrap{flex:1;height:9px;background:var(--color-background-secondary,#eee);border-radius:5px;overflow:hidden}
.breakdown-bar{height:100%;border-radius:5px;min-width:2px}
.breakdown-name{width:92px;color:var(--color-text-secondary);font-size:11px}
.breakdown-pct{width:36px;text-align:right;color:var(--color-text-secondary);font-variant-numeric:tabular-nums;font-size:11px}
.breakdown-val{width:88px;text-align:right;font-variant-numeric:tabular-nums;font-weight:500}
.scenario-toggle{display:flex;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:8px;overflow:hidden;background:var(--color-background-primary,#fff)}
.sc-btn{font-size:12px;padding:6px 14px;border:none;background:transparent;cursor:pointer;color:var(--color-text-secondary);font-weight:500;transition:background .15s,color .15s}
.sc-btn:hover:not(.active){background:var(--color-background-secondary,#f0f0eb)}
.sc-btn.active{background:var(--color-text-primary,#1a1a1a);color:var(--color-background-primary,#fff)}
.file-btn{font-size:12px;padding:6px 12px;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:8px;background:var(--color-background-primary,#fff);cursor:pointer;color:var(--color-text-primary);font-weight:500;transition:background .15s}
.file-btn:hover{background:var(--color-background-secondary,#f0f0eb)}
.file-btn--primary{background:var(--color-text-primary,#1a1a1a);color:var(--color-background-primary,#fff);border-color:var(--color-text-primary,#1a1a1a)}
.file-btn--primary:hover{opacity:.92}
.file-input-hidden{position:absolute;width:0;height:0;opacity:0;pointer-events:none}
.save-status{font-size:11px;color:var(--color-text-success,#3b6d11);min-width:5.5em;text-align:right;opacity:0;transition:opacity .25s}
.save-status.visible{opacity:1}
.param-group{background:var(--color-background-secondary,#f8f8f6);border:0.5px solid var(--color-border-tertiary,#e8e8e3);border-radius:10px;padding:.85rem .95rem 1rem}
.param-group-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary,#555);margin-bottom:2px}
.param-group-desc{font-size:11px;color:var(--color-text-tertiary,#888);margin-bottom:.65rem;line-height:1.35}
.param-group-fields{display:flex;flex-direction:column;gap:10px}
.param-row{display:flex;flex-direction:column;gap:5px}
.param-label{font-size:12px;color:var(--color-text-primary,#333);display:flex;align-items:center;justify-content:space-between;gap:8px}
.param-label-text{display:flex;align-items:center;gap:5px;min-width:0}
.param-val{font-weight:600;color:var(--color-text-primary);font-size:12px;font-variant-numeric:tabular-nums;flex-shrink:0}
input[type=range]{width:100%;height:6px;accent-color:#378ADD;cursor:pointer}
input[type=range]::-webkit-slider-thumb{cursor:pointer}
.tip-wrap{position:relative;display:inline-flex;flex-shrink:0}
.tip-btn{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:10px;font-weight:700;line-height:1;color:var(--color-text-secondary,#666);background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-secondary,#ccc);cursor:help}
.tip-btn:hover,.tip-btn:focus{color:var(--color-text-primary);border-color:#378ADD;outline:none}
.tip-popup{position:absolute;left:50%;bottom:calc(100% + 6px);transform:translateX(-50%);width:max-content;max-width:240px;padding:8px 10px;font-size:11px;font-weight:400;line-height:1.4;color:#fff;background:#2a2a2a;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.18);opacity:0;visibility:hidden;pointer-events:none;transition:opacity .15s,visibility .15s;z-index:20;text-align:left}
.tip-popup::after{content:'';position:absolute;top:100%;left:50%;margin-left:-5px;border:5px solid transparent;border-top-color:#2a2a2a}
.tip-wrap:hover .tip-popup,.tip-wrap:focus-within .tip-popup{opacity:1;visibility:visible}
.footnote{font-size:11px;color:var(--color-text-secondary);margin-top:10px;line-height:1.45;padding-top:8px;border-top:0.5px solid var(--color-border-tertiary,#eee)}
</style>

<h2 class="sr-only">OpenScaler cloud cost estimator — monthly per-server cost breakdown and VM pricing model</h2>

<div style="padding:.25rem 0">

<div class="toolbar">
  <div class="scenario-toggle">
    <button class="sc-btn active" id="sc-p2" onclick="setScenario('p2')">Phase 2 — self-assembled</button>
    <button class="sc-btn" id="sc-p1" onclick="setScenario('p1')">Phase 1 — AT hardware</button>
  </div>
  <div class="toolbar-actions">
    <div class="price-display-wrap">
      <label for="price-display">Price display</label>
      <select id="price-display" onchange="priceDisplay=this.value;render()">
        <option value="usd" selected>USD</option>
        <option value="dzd">DZD</option>
      </select>
    </div>
    <button type="button" class="file-btn file-btn--primary" onclick="saveConfigToFile()" title="Save config (Ctrl+S)">Save config…</button>
    <button type="button" class="file-btn" onclick="document.getElementById('config-file-input').click()" title="Load config">Load config…</button>
    <input type="file" id="config-file-input" class="file-input-hidden" accept=".json,application/json" onchange="loadConfigFromFile(this)">
    <span id="save-status" class="save-status" aria-live="polite"></span>
  </div>
</div>

<div class="two-col">
  <div class="card">
    <div class="section-title">Cost breakdown / server / month</div>
    <div id="breakdown"></div>
    <div class="params-tabs-section">
      <div class="section-title" style="margin-bottom:.5rem">Model parameters</div>
      <div class="params-tabs" id="param-tabs" role="tablist" aria-label="Model parameter categories"></div>
      <div class="params-panel" id="controls" role="tabpanel"></div>
      <p class="params-footnote">Hover the <span class="tip-btn" style="cursor:default;vertical-align:middle">?</span> on each field for a short explanation.</p>
    </div>
  </div>
  <div class="card">
    <div class="section-title">VM pricing vs catalog (<span id="plan-count">11</span> plans)</div>
    <div class="vm-table-wrap" id="vm-table-wrap"></div>
    <p class="footnote footnote--vm" id="vm-footnote"></p>
    <div class="metrics-grid" id="metrics"></div>
  </div>
</div>

</div>

<script>
const P = {
  usd_dzd: 135,
  hw_usd: 4000,
  customs_pct: 0.35,
  amort_months: 48,
  server_w: 300,
  pue: 1.4,
  power_dzd_kwh: 4.68,
  rack_u: 2,
  rack_per_u_dzd: 3000,
  bw_mbps: 1000,
  bw_dzd_mbps: 5,
  num_servers: 20,
  team_people: 2,
  salary_dzd: 150000,
  cpu_cores: 24,
  cpu_oversub: 4,
  ram_gb: 128,
  ram_oversub: 1.2,
  nvme_tb_per_server: 4,
  disk_dzd_per_gb_mo: 3,
  transfer_dzd_per_tb_mo: 150,
  avg_vm_ram: 2,
  avg_vm_vcpu: 2,
  avg_vm_disk_gb: 40,
  avg_vm_transfer_tb: 4,
  utilization: 0.70,
  margin: 0.40,
};

let scenario = 'p2';
let priceDisplay = 'usd';
let activeParamTab = 'fx';

function listedDzd(pl){ return pl.monthly_usd * P.usd_dzd; }

function planBreakEvenDzd(pl, C){
  const computeScale = Math.max(pl.memory / P.avg_vm_ram, pl.vcpus / P.avg_vm_vcpu);
  return C.compute_cost_per_paying_vm * computeScale
    + pl.disk * C.storage_per_gb_mo
    + pl.transfer * C.transfer_per_tb_mo;
}

function priceCellListed(pl){
  if(priceDisplay === 'dzd') return `${fmt(listedDzd(pl))} DZD`;
  return `\$${pl.monthly_usd.toFixed(2)}`;
}

function priceCellModel(dzd, usd, opts){
  if(priceDisplay === 'dzd'){
    const main = `${fmt(dzd)} DZD`;
    if(opts && opts.hint === 'cost') return `${main}<span class="price-sub">cost basis</span>`;
    return main;
  }
  return `\$${usd.toFixed(2)}`;
}

/** Synced from pricing_placeholders.json — refreshed on load when served over HTTP */
let PLANS = [
  {id:'b-1-500mb-10', name:'Basic 1-500mb-25GB', memory:0.5, vcpus:1, disk:10, transfer:0.5, units:1, monthly_usd:1.50},
  {id:'s-1vcpu-1gb', name:'Basic 1-1-25GB', memory:1, vcpus:1, disk:15, transfer:1, units:1, monthly_usd:2.50},
  {id:'b-1-2-50', name:'Basic 1-2-50GB', memory:2, vcpus:1, disk:20, transfer:2, units:2, monthly_usd:3.50},
  {id:'b-2-4-100', name:'Basic 2-4-100GB', memory:4, vcpus:2, disk:40, transfer:4, units:4, monthly_usd:7.50},
  {id:'b-4-8-160', name:'Basic 4-8-160GB', memory:8, vcpus:4, disk:80, transfer:8, units:8, monthly_usd:15.00},
  {id:'b-8-16-320', name:'Basic 8-16-320GB', memory:16, vcpus:8, disk:160, transfer:16, units:16, monthly_usd:25.00},
  {id:'b-8-32-640', name:'Basic 8-32-640GB', memory:32, vcpus:8, disk:640, transfer:34, units:34, monthly_usd:35.00},
  {id:'b-16-32-640', name:'Basic 16-32-640GB', memory:32, vcpus:16, disk:320, transfer:34, units:34, monthly_usd:60.00},
  {id:'b-16-64-1280', name:'Basic 16-64-1280GB', memory:64, vcpus:16, disk:640, transfer:68, units:64, monthly_usd:98.00},
  {id:'b-32-64-1280', name:'Basic 32-64-1280GB', memory:64, vcpus:32, disk:640, transfer:68, units:64, monthly_usd:175.00},
  {id:'b-32-128-2560', name:'Basic 32-128-2560GB', memory:128, vcpus:32, disk:1280, transfer:136, units:128, monthly_usd:320.00},
];

const BAR_COLORS = ['#378ADD','#1D9E75','#D85A30','#BA7517','#7F77DD','#D4537E','#888'];
const BAR_LABELS = ['Hardware','Power','Rack','Transit (pipe)','Storage (NVMe)','Team','Misc'];

function fmt(n){return Math.round(n).toLocaleString()}

function compute(){
  let hw_landed_dzd, monthly_hw;
  if(scenario==='p1'){
    hw_landed_dzd = 2000000;
    monthly_hw = hw_landed_dzd / Math.min(P.amort_months, 36);
  } else {
    hw_landed_dzd = P.hw_usd * (1 + P.customs_pct) * P.usd_dzd;
    monthly_hw = hw_landed_dzd / P.amort_months;
  }

  const monthly_power = P.server_w * P.pue * 720 / 1000 * P.power_dzd_kwh;
  const monthly_rack = P.rack_per_u_dzd * P.rack_u;
  const monthly_bw = (P.bw_mbps / Math.max(P.num_servers, 1)) * P.bw_dzd_mbps;
  const monthly_storage = P.nvme_tb_per_server * 1024 * P.disk_dzd_per_gb_mo;

  const sellable_by_ram = (P.ram_gb / P.ram_oversub) / P.avg_vm_ram;
  const sellable_by_cpu = P.cpu_cores * P.cpu_oversub / Math.max(P.avg_vm_vcpu, 0.5);
  const sellable_by_disk = (P.nvme_tb_per_server * 1024) / Math.max(P.avg_vm_disk_gb, 1);
  const sellable_vms = Math.floor(Math.min(sellable_by_ram, sellable_by_cpu, sellable_by_disk));
  const paying_vms = sellable_vms * P.utilization;

  const monthly_team = (P.team_people * P.salary_dzd) / Math.max(P.num_servers, 1);
  const monthly_misc = (hw_landed_dzd * 0.05 / 12) + 2000;
  const monthly_compute = monthly_hw + monthly_power + monthly_rack + monthly_bw + monthly_team + monthly_misc;
  const total = monthly_compute + monthly_storage;
  const compute_cost_per_paying_vm = paying_vms > 0 ? monthly_compute / paying_vms : 999999;

  const cost_per_paying_vm = paying_vms > 0 ? total / paying_vms : 999999;
  const min_price_vm = cost_per_paying_vm / (1 - P.margin);
  const storage_per_gb_mo = P.disk_dzd_per_gb_mo;
  const transfer_per_tb_mo = P.transfer_dzd_per_tb_mo;

  const binding = [
    ['RAM', sellable_by_ram],
    ['CPU', sellable_by_cpu],
    ['Disk', sellable_by_disk],
  ].sort((a, b) => a[1] - b[1])[0][0];

  return {
    monthly_hw, monthly_power, monthly_rack, monthly_bw, monthly_storage,
    monthly_team, monthly_misc, monthly_compute, total, sellable_vms, paying_vms,
    cost_per_paying_vm, compute_cost_per_paying_vm, min_price_vm,
    hw_landed_dzd, binding, sellable_by_ram, sellable_by_cpu, sellable_by_disk,
    storage_per_gb_mo, transfer_per_tb_mo,
  };
}

/** Break-even $/mo: scaled compute slot + provisioned disk + included transfer. */
function planBreakEvenUsd(pl, C, usd){
  const computeScale = Math.max(
    pl.memory / P.avg_vm_ram,
    pl.vcpus / P.avg_vm_vcpu,
  );
  const computeUsd = (C.compute_cost_per_paying_vm / usd) * computeScale;
  const diskUsd = pl.disk * C.storage_per_gb_mo / usd;
  const transferUsd = pl.transfer * C.transfer_per_tb_mo / usd;
  return computeUsd + diskUsd + transferUsd;
}

function priceFootnote(){
  if(priceDisplay === 'dzd'){
    return `All amounts in DZD at <strong>${P.usd_dzd} DZD/\$</strong>. <strong>Listed</strong> = catalog \$ × FX. <strong>Break-even &amp; target</strong> from the cost model. <strong>vs target</strong> compares listed vs target in DZD.`;
  }
  return `All amounts in USD. Costs use <strong>${P.usd_dzd} DZD/\$</strong> internally; break-even and target are converted from the DZD cost model. Switch to DZD to see retail prices in dinars.`;
}

function render(){
  const C = compute();
  const usd = P.usd_dzd;

  document.getElementById('plan-count').textContent = PLANS.length;

  const refPlan = {
    memory: P.avg_vm_ram, vcpus: P.avg_vm_vcpu,
    disk: P.avg_vm_disk_gb, transfer: P.avg_vm_transfer_tb,
  };
  const refBeDzd = planBreakEvenDzd(refPlan, C);
  const refTargetDzd = refBeDzd / (1 - P.margin);
  const refBeUsd = refBeDzd / usd;
  const refTargetUsd = refTargetDzd / usd;

  const refBeMetric = priceDisplay === 'dzd'
    ? `${fmt(refBeDzd)} DZD`
    : `$${refBeUsd.toFixed(2)}`;
  const refTargetMetric = priceDisplay === 'dzd'
    ? `${fmt(refTargetDzd)} DZD`
    : `$${refTargetUsd.toFixed(2)}`;
  const metricsEl = document.getElementById('metrics');
  metricsEl.innerHTML = `
    <div class="metric"><div class="metric-label">Cost / server / mo</div><div class="metric-value">${fmt(C.total)} DZD</div><div class="metric-sub">FX ${P.usd_dzd}</div></div>
    <div class="metric"><div class="metric-label">VM slots · ${Math.round(P.utilization*100)}% · ${C.binding}</div><div class="metric-value">${Math.round(C.paying_vms)} / ${C.sellable_vms}</div></div>
    <div class="metric"><div class="metric-label">Break-even · ${P.avg_vm_ram}G/${P.avg_vm_vcpu}c/${P.avg_vm_disk_gb}G/${P.avg_vm_transfer_tb}T</div><div class="metric-value ${refBeUsd>5?'danger':'success'}">${refBeMetric}</div></div>
    <div class="metric"><div class="metric-label">Target · ${Math.round(P.margin*100)}% margin</div><div class="metric-value ${refTargetUsd>8?'warn':''}">${refTargetMetric}</div></div>
  `;

  const costs = [
    C.monthly_hw, C.monthly_power, C.monthly_rack, C.monthly_bw,
    C.monthly_storage, C.monthly_team, C.monthly_misc,
  ];
  const pcts = costs.map(c => c / C.total * 100);
  document.getElementById('breakdown').innerHTML = costs.map((c, i) => `
    <div class="breakdown-row">
      <span class="breakdown-name">${BAR_LABELS[i]}</span>
      <div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:${Math.round(pcts[i])}%;background:${BAR_COLORS[i]}"></div></div>
      <span class="breakdown-pct">${Math.round(pcts[i])}%</span>
      <span class="breakdown-val">${fmt(c)}</span>
    </div>
  `).join('');

  const marginPct = Math.round(P.margin * 100);
  const vmEl = document.getElementById('vm-table-wrap');
  vmEl.innerHTML = `<table class="vm-table">
    <thead><tr>
      <th>Plan</th>
      <th>Spec</th>
      <th style="text-align:right">Listed</th>
      <th style="text-align:right">Break-even</th>
      <th style="text-align:right">Target (+${marginPct}%)</th>
      <th style="text-align:right">vs target</th>
    </tr></thead>
    <tbody>
    ${PLANS.map(pl => {
      const beDzd = planBreakEvenDzd(pl, C);
      const targetDzd = beDzd / (1 - P.margin);
      const beUsd = beDzd / usd;
      const targetUsd = targetDzd / usd;
      const listedVal = priceDisplay === 'dzd' ? listedDzd(pl) : pl.monthly_usd;
      const targetVal = priceDisplay === 'dzd' ? targetDzd : targetUsd;
      const mgn = ((listedVal - targetVal) / targetVal * 100);
      const cls = mgn >= 0 ? 'pill-ok' : mgn > -25 ? 'pill-warn' : 'pill-bad';
      const mgnLabel = mgn >= 0 ? '+' + Math.round(mgn) + '%' : Math.round(mgn) + '%';
      const spec = `${pl.vcpus}c · ${pl.memory}G · ${pl.disk}G · ${pl.transfer}T`;
      return `<tr>
        <td><div>${pl.name}</div><div class="plan-id">${pl.id}</div></td>
        <td style="color:var(--color-text-secondary)">${spec}</td>
        <td style="text-align:right">${priceCellListed(pl)}</td>
        <td style="text-align:right">${priceCellModel(beDzd, beUsd, {hint: 'cost'})}</td>
        <td style="text-align:right">${priceCellModel(targetDzd, targetUsd)}</td>
        <td style="text-align:right"><span class="pill ${cls}">${mgnLabel}</span></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
  document.getElementById('vm-footnote').innerHTML = priceFootnote();

  document.getElementById('price-display').value = priceDisplay;

  renderControls();
}

function escTip(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function renderField(c){
  const val = P[c.key];
  let display = c.fmt ? c.fmt(val) : fmt(val);
  if(c.unit === '$') display = '$' + display;
  else if(c.unit) display = display + ' ' + c.unit;
  const tipHtml = c.tip ? `<span class="tip-wrap">
    <button type="button" class="tip-btn" aria-label="Help">?</button>
    <span class="tip-popup" role="tooltip">${escTip(c.tip)}</span>
  </span>` : '';
  return `<div class="param-row">
    <label class="param-label" for="sl-${c.key}">
      <span class="param-label-text"><span>${c.label}</span>${tipHtml}</span>
      <span class="param-val">${display}</span>
    </label>
    <input type="range" id="sl-${c.key}" min="${c.min}" max="${c.max}" step="${c.step}" value="${val}"
      aria-label="${escTip(c.label)}"
      oninput="P['${c.key}']=+this.value;render()">
  </div>`;
}

function visibleParamGroups(){
  return CONTROL_GROUPS.filter(g => !g.show || g.show());
}

function setParamTab(id){
  activeParamTab = id;
  renderControls();
}

function renderControls(){
  const groups = visibleParamGroups();
  if(!groups.some(g => g.id === activeParamTab)){
    activeParamTab = groups[0] ? groups[0].id : 'fx';
  }
  const active = groups.find(g => g.id === activeParamTab) || groups[0];
  const tabsEl = document.getElementById('param-tabs');
  tabsEl.innerHTML = groups.map(g => `
    <button type="button" class="param-tab${g.id === activeParamTab ? ' active' : ''}"
      role="tab" aria-selected="${g.id === activeParamTab}"
      aria-controls="controls" id="tab-${g.id}"
      onclick="setParamTab('${g.id}')">${g.title}</button>
  `).join('');
  const el = document.getElementById('controls');
  if(!active){
    el.innerHTML = '';
    return;
  }
  el.setAttribute('aria-labelledby', 'tab-' + active.id);
  el.innerHTML = `<section class="param-group" aria-labelledby="grp-${active.id}">
    <div class="param-group-title" id="grp-${active.id}">${active.title}</div>
    <div class="param-group-desc">${active.desc}</div>
    <div class="param-group-fields">${active.fields.map(renderField).join('')}</div>
  </section>`;
}

function setScenario(s){
  scenario = s;
  document.getElementById('sc-p1').classList.toggle('active', s === 'p1');
  document.getElementById('sc-p2').classList.toggle('active', s === 'p2');
  render();
}

function mapPlansFromJson(sizes){

    name: s.name,
    memory: s.memory,
    vcpus: s.vcpus,
    disk: s.disk,
    transfer: s.transfer,
    units: s.units,
    monthly_usd: parseFloat(s.price_monthly),
  }));
}

const CONFIG_FORMAT = 'openscaler-cost-model';
const CONFIG_VERSION = 1;
const CONFIG_FILE_TYPES = [{ description: 'OpenScaler cost model', accept: { 'application/json': ['.json'] } }];

let saveStatusTimer = null;

const HIDDEN_PARAMS = {
  power_dzd_kwh: {
    label: 'Electricity rate',
    unit: 'DZD/kWh',
    group: 'Fixed constants (not in UI sliders)',
    description: 'Algeria subsidized commercial rate used for monthly power per server (server_w × PUE × 720h).',
  },
  rack_u: {
    label: 'Rack units per server',
    unit: 'U',
    group: 'Fixed constants (not in UI sliders)',
    description: 'Physical rack height assumed per host when splitting colocation cost (monthly_rack = rack_per_u_dzd × rack_u).',
  },
};

const SCENARIO_LABELS = {
  p1: 'Phase 1 — AT hardware (fixed 2M DZD landed cost, 36 mo amort cap)',
  p2: 'Phase 2 — self-assembled (BOM USD + import overhead, full amortization)',
};

function buildParameterExport(){
  const out = {};
  for (const g of CONTROL_GROUPS) {
    for (const f of g.fields) {
      out[f.key] = {
        value: P[f.key],
        label: f.label,
        unit: f.unit || null,
        group: g.title,
        group_description: g.desc,
        description: f.tip || null,
        editable_in_ui: true,
      };
    }
  }
  for (const [key, info] of Object.entries(HIDDEN_PARAMS)) {
    if (!(key in out) && key in P) {
      out[key] = {
        value: P[key],
        label: info.label,
        unit: info.unit,
        group: info.group,
        description: info.description,
        editable_in_ui: false,
      };
    }
  }
  return out;
}

function buildComputedSnapshot(){
  const C = compute();
  const usd = P.usd_dzd;
  const refPlan = {
    memory: P.avg_vm_ram, vcpus: P.avg_vm_vcpu,
    disk: P.avg_vm_disk_gb, transfer: P.avg_vm_transfer_tb,
  };
  const refBeDzd = planBreakEvenDzd(refPlan, C);
  const refTargetDzd = refBeDzd / (1 - P.margin);
  return {
    currency_note: 'Internal model runs in DZD; USD figures use parameters.usd_dzd.value.',
    cost_per_server_month_dzd: Math.round(C.total),
    cost_breakdown_dzd: {
      hardware: Math.round(C.monthly_hw),
      power: Math.round(C.monthly_power),
      rack: Math.round(C.monthly_rack),
      transit_bandwidth: Math.round(C.monthly_bw),
      storage_nvme: Math.round(C.monthly_storage),
      team_ops: Math.round(C.monthly_team),
      misc: Math.round(C.monthly_misc),
    },
    capacity: {
      sellable_vm_slots: C.sellable_vms,
      paying_vms_at_utilization: Math.round(C.paying_vms),
      utilization_pct: Math.round(P.utilization * 100),
      binding_constraint: C.binding,
      sellable_by_ram: Math.round(C.sellable_by_ram * 10) / 10,
      sellable_by_cpu: Math.round(C.sellable_by_cpu * 10) / 10,
      sellable_by_disk: Math.round(C.sellable_by_disk * 10) / 10,
    },
    reference_vm: {
      spec: `${P.avg_vm_ram} GiB RAM · ${P.avg_vm_vcpu} vCPU · ${P.avg_vm_disk_gb} GB disk · ${P.avg_vm_transfer_tb} TB transfer`,
      break_even_dzd: Math.round(refBeDzd),
      break_even_usd: Math.round(refBeDzd / usd * 100) / 100,
      target_price_dzd: Math.round(refTargetDzd),
      target_price_usd: Math.round(refTargetDzd / usd * 100) / 100,
      target_margin_pct: Math.round(P.margin * 100),
    },
    catalog_summary: {
      plan_count: PLANS.length,
      plans_above_target: PLANS.filter(pl => {
        const targetDzd = planBreakEvenDzd(pl, C) / (1 - P.margin);
        return listedDzd(pl) >= targetDzd;
      }).length,
      plans_below_target: PLANS.filter(pl => {
        const targetDzd = planBreakEvenDzd(pl, C) / (1 - P.margin);
        return listedDzd(pl) < targetDzd;
      }).length,
    },
  };
}

function buildConfigDocument(){
  return {
    _meta: {
      format: CONFIG_FORMAT,
      format_version: CONFIG_VERSION,
      saved_at: new Date().toISOString(),
      tool: 'OpenScaler cloud cost estimator',
      source_file: 'openscaler_cost_model.html',
      purpose: 'Saved snapshot of model inputs and VM catalog for OpenScaler pricing analysis.',
    },
    _readme: {
      what_this_is: 'Configuration export from the OpenScaler cost model — an interactive estimator that breaks down monthly per-server costs (hardware, power, rack, transit, storage, ops) and compares catalog VM prices to model break-even and target prices.',
      how_to_restore: 'Open openscaler_cost_model.html and click "Load config…", or paste this file into an AI assistant as context when discussing pricing.',
      scenarios: SCENARIO_LABELS,
      key_concepts: {
        break_even: 'Minimum price to cover allocated compute slot + provisioned disk + included transfer for each plan (before profit).',
        target: 'Break-even ÷ (1 − margin). Listed catalog price should ideally be at or above target.',
        listed: 'Current retail price in the VM catalog (monthly_usd on each plan, converted to DZD via FX).',
        phase_1: 'Uses fixed 2,000,000 DZD landed server cost (Algérie Télécom hardware path).',
        phase_2: 'Uses self-built BOM in USD plus import overhead percentage, amortized over amort_months.',
      },
      file_sections: {
        ui: 'Display preferences and active scenario (p1 or p2).',
        parameters: 'All numeric model inputs; each entry has value, label, unit, and description.',
        catalog: 'VM plans compared in the pricing table (specs + listed monthly USD).',
        computed_snapshot: 'Derived metrics at save time — useful context without re-running the model.',
      },
    },
    ui: {
      scenario,
      scenario_label: SCENARIO_LABELS[scenario],
      price_display: priceDisplay,
      active_param_tab: activeParamTab,
    },
    parameters: buildParameterExport(),
    catalog: {
      note: 'Plans used in "VM pricing vs catalog". monthly_usd is the listed retail price; break-even/target are computed from parameters.',
      plans: PLANS.map(pl => ({
        id: pl.id,
        name: pl.name,
        vcpus: pl.vcpus,
        memory_gib: pl.memory,
        disk_gb: pl.disk,
        transfer_tb: pl.transfer,
        units: pl.units,
        listed_monthly_usd: pl.monthly_usd,
        listed_monthly_dzd: Math.round(pl.monthly_usd * P.usd_dzd * 100) / 100,
      })),
    },
    computed_snapshot: buildComputedSnapshot(),
  };
}

function configJsonString(){
  return JSON.stringify(buildConfigDocument(), null, 2);
}

function downloadConfigJson(json, filename){
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function flashSaveStatus(msg){
  const el = document.getElementById('save-status');
  if(!el) return;
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(saveStatusTimer);
  saveStatusTimer = setTimeout(() => el.classList.remove('visible'), 2200);
}

async function writeConfigToHandle(handle){
  const writable = await handle.createWritable();
  await writable.write(configJsonString());
  await writable.close();
}

async function saveConfigToFile(){
  const json = configJsonString();
  const stamp = new Date().toISOString().slice(0, 10);
  if(window.showSaveFilePicker){
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: `openscaler-cost-model-${stamp}.json`,
        types: CONFIG_FILE_TYPES,
      });
      await writeConfigToHandle(handle);
      flashSaveStatus('Saved');
      return;
    } catch (err) {
      if(err.name === 'AbortError') return;
    }
  }
  downloadConfigJson(json, `openscaler-cost-model-${stamp}.json`);
  flashSaveStatus('Saved');
}

function onSaveShortcut(e){
  if(!(e.ctrlKey || e.metaKey) || (e.key !== 's' && e.key !== 'S')) return;
  e.preventDefault();
  saveConfigToFile();
}

function applyConfigDocument(data){
  if(!data || data._meta?.format !== CONFIG_FORMAT){
    throw new Error('Not a valid OpenScaler cost model config (missing or unknown format).');
  }
  if(data._meta?.format_version > CONFIG_VERSION){
    throw new Error('Config was saved with a newer format version — update openscaler_cost_model.html.');
  }

  const params = data.parameters;
  if(params && typeof params === 'object'){
    for (const [key, entry] of Object.entries(params)) {
      const val = entry && typeof entry === 'object' ? entry.value : entry;
      if(key in P && typeof val === 'number' && !Number.isNaN(val)) P[key] = val;
    }
  } else if(data.P && typeof data.P === 'object'){
    for (const [key, val] of Object.entries(data.P)) {
      if(key in P && typeof val === 'number') P[key] = val;
    }
  }

  const plans = data.catalog?.plans ?? data.plans;
  if(Array.isArray(plans) && plans.length){
    PLANS = plans.map(p => ({
      id: p.id,
      name: p.name,
      memory: p.memory_gib ?? p.memory,
      vcpus: p.vcpus,
      disk: p.disk_gb ?? p.disk,
      transfer: p.transfer_tb ?? p.transfer,
      units: p.units,
      monthly_usd: p.listed_monthly_usd ?? p.monthly_usd ?? parseFloat(p.price_monthly),
    }));
  }

  if(data.ui){
    if(data.ui.scenario === 'p1' || data.ui.scenario === 'p2') scenario = data.ui.scenario;
    if(data.ui.price_display === 'usd' || data.ui.price_display === 'dzd') priceDisplay = data.ui.price_display;
    if(data.ui.active_param_tab) activeParamTab = data.ui.active_param_tab;
  }

  document.getElementById('sc-p1').classList.toggle('active', scenario === 'p1');
  document.getElementById('sc-p2').classList.toggle('active', scenario === 'p2');
  render();
}

function loadConfigFromFile(input){
  const file = input.files && input.files[0];
  input.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      applyConfigDocument(data);
    } catch (err) {
      alert('Could not load config: ' + (err.message || String(err)));
    }
  };
  reader.onerror = () => alert('Could not read the selected file.');
  reader.readAsText(file);
}

async function loadPlansFromJson(){
  try {
    const res = await fetch('pricing_placeholders.json');
    if(!res.ok) return;
    const data = await res.json();
    if(data.sizes && data.sizes.length){
      PLANS = mapPlansFromJson(data.sizes);
    }
  } catch (_) { /* file:// or missing — embedded PLANS used */ }
}

async function initApp(){
  await loadPlansFromJson();
  render();
  document.addEventListener('keydown', onSaveShortcut);
}

initApp();
</script>
